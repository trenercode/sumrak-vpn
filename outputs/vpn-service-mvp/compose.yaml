services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: vpn-xray
    restart: unless-stopped
    command: run -config /etc/xray/config.json
    network_mode: host
    volumes:
      - ./deploy/xray:/etc/xray:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    network_mode: host
    volumes:
      - ./deploy/xray:/data/xray
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      xray:
        condition: service_started

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    command: python -m app.bot
    network_mode: host
    volumes:
      - ./deploy/xray:/data/xray
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      xray:
        condition: service_started

volumes:
  postgres_data:
