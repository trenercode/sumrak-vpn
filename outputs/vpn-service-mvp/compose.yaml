services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    network_mode: host
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    command: python -m app.bot
    network_mode: host
    cap_add:
      - NET_ADMIN
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
