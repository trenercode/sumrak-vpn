name: sumrak-vpn-test

services:
  xray:
    image: ghcr.io/xtls/xray-core:26.6.1
    container_name: sumrak-vpn-test-xray
    restart: unless-stopped
    command: run -config /etc/xray/config.json
    ports:
      - "18443:18443"
    volumes:
      - ./deploy/xray:/etc/xray:ro
    healthcheck:
      test: ["CMD", "xray", "run", "-test", "-config", "/etc/xray/config.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - staging

  db:
    image: postgres:16-alpine
    container_name: sumrak-vpn-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpn_test
      POSTGRES_USER: vpn_test
      POSTGRES_PASSWORD: vpn_test_change_me
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_test -d vpn_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - staging

  migrate:
    build: .
    container_name: sumrak-vpn-test-migrate
    env_file:
      - .env
      - ./deploy/xray/reality.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn_test:vpn_test_change_me@db:5432/vpn_test
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - staging

  staging_xray_sync:
    build: .
    container_name: sumrak-vpn-test-xray-sync
    env_file:
      - .env
      - ./deploy/xray/reality.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn_test:vpn_test_change_me@db:5432/vpn_test
    command: python -m app.staging
    volumes:
      - ./deploy/xray:/data/xray
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      migrate:
        condition: service_completed_successfully
      xray:
        condition: service_healthy
    networks:
      - staging

  web:
    build: .
    container_name: sumrak-vpn-test-web
    restart: unless-stopped
    env_file:
      - .env
      - ./deploy/xray/reality.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn_test:vpn_test_change_me@db:5432/vpn_test
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./deploy/xray:/data/xray
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      staging_xray_sync:
        condition: service_completed_successfully
    networks:
      - staging

  bot:
    build: .
    container_name: sumrak-vpn-test-bot
    restart: unless-stopped
    env_file:
      - .env
      - ./deploy/xray/reality.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn_test:vpn_test_change_me@db:5432/vpn_test
    command: python -m app.bot
    volumes:
      - ./deploy/xray:/data/xray
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      staging_xray_sync:
        condition: service_completed_successfully
    networks:
      - staging

volumes:
  staging_postgres_data:
    name: sumrak-vpn-test-postgres-data

networks:
  staging:
    name: sumrak-vpn-test-network
